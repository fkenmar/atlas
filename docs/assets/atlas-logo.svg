<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" role="img" aria-label="atlas">
  <title>atlas</title>
  <!-- Designed in Figma (figma.com/design/i0LPvwogQWuJ1YKd4zaLZ1): a friendly
       gradient disc holding a hub-and-spoke network — a central amber rank-#1
       node with satellite nodes on a ring, the structural map radiating from
       its most-central file. -->
  <defs>
    <linearGradient id="atlas-bg" x1="14" y1="8" x2="116" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#584EEB"/>
      <stop offset="1" stop-color="#7C73F1"/>
    </linearGradient>
  </defs>
  <circle cx="64" cy="64" r="64" fill="url(#atlas-bg)"/>
  <g stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round">
    <path d="M64 64 L64 32"/>
    <path d="M64 64 L91.71 48"/>
    <path d="M64 64 L91.71 80"/>
    <path d="M64 64 L64 96"/>
    <path d="M64 64 L36.29 80"/>
    <path d="M64 64 L36.29 48"/>
  </g>
  <g fill="#FFFFFF">
    <circle cx="64" cy="32" r="6"/>
    <circle cx="91.71" cy="48" r="6"/>
    <circle cx="91.71" cy="80" r="6"/>
    <circle cx="64" cy="96" r="6"/>
    <circle cx="36.29" cy="80" r="6"/>
    <circle cx="36.29" cy="48" r="6"/>
    <circle cx="64" cy="64" r="10"/>
  </g>
  <circle cx="64" cy="64" r="4.5" fill="#FBBF24"/>
</svg>
